<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分数查询 - 上海高考志愿填报辅助系统</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f4ff',
                            100: '#e0e9ff',
                            200: '#c7d6fe',
                            300: '#a4b8fc',
                            400: '#8093f8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .prob-high { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        .prob-medium { background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); }
        .prob-low { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }
        .prob-risk { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); }
        .nav-item {
            position: relative;
        }
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .nav-item:hover::after, .nav-item.active::after {
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" v-cloak>
        {% raw %}
        <!-- 导航栏 -->
        <nav class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <a href="/" class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center text-white font-bold text-lg shadow-lg">沪</div>
                        <div class="hidden sm:block">
                            <div class="text-lg font-bold text-gray-800">上海高考助手</div>
                            <div class="text-xs text-gray-500 -mt-1">志愿填报辅助系统</div>
                        </div>
                    </a>
                    <div class="hidden md:flex items-center space-x-1">
                        <a href="/" class="nav-item px-4 py-2 text-gray-700 font-medium hover:text-primary-600 transition-colors">首页</a>
                        <a href="/query" class="nav-item active px-4 py-2 text-primary-600 font-medium">分数查询</a>
                        <a href="/simulate" class="nav-item px-4 py-2 text-gray-700 font-medium hover:text-primary-600 transition-colors">模拟填报</a>
                        <a href="/school" class="nav-item px-4 py-2 text-gray-700 font-medium hover:text-primary-600 transition-colors">高中分析</a>
                        <a href="/major" class="nav-item px-4 py-2 text-gray-700 font-medium hover:text-primary-600 transition-colors">专业指导</a>
                        <a href="/news" class="nav-item px-4 py-2 text-gray-700 font-medium hover:text-primary-600 transition-colors">政策资讯</a>
                    </div>
                </div>

                    <!-- 移动端菜单按钮 -->
                    <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors">
                        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path v-if="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 移动端菜单 -->
            <div v-show="mobileMenuOpen" class="md:hidden bg-white border-t border-gray-100">
                <div class="px-4 py-3 space-y-1">
                    <a href="/" class="block px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-50">首页</a>
                    <a href="/query" class="block px-4 py-2 rounded-lg bg-primary-50 text-primary-600 font-medium">分数查询</a>
                    <a href="/simulate" class="block px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-50">模拟填报</a>
                    <a href="/school" class="block px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-50">高中分析</a>
                    <a href="/major" class="block px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-50">专业指导</a>
                    <a href="/news" class="block px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-50">政策资讯</a>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 查询卡片 -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 mb-6">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">分数查询</h1>
                <p class="text-gray-500 mb-6">输入您的高考分数，系统将为您智能推荐可填报院校</p>

                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">高考分数</label>
                        <input type="number" v-model="score"
                               class="w-40 h-12 px-4 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:outline-none text-lg font-semibold"
                               placeholder="请输入分数" min="0" max="660">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">参考年份</label>
                        <select v-model="year" class="w-32 h-12 px-4 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:outline-none">
                            <option v-for="y in years" :key="y" :value="y">{{ y }}年</option>
                        </select>
                    </div>
                    <button @click="handleSearch"
                            :disabled="loading"
                            class="h-12 px-8 gradient-bg text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span v-if="!loading">查询院校</span>
                        <span v-else class="flex items-center gap-2">
                            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            查询中...
                        </span>
                    </button>
                    <button v-if="result" @click="exportJSON"
                            class="h-12 px-6 bg-gray-100 text-gray-700 font-medium rounded-xl hover:bg-gray-200 transition-all">
                        导出 JSON
                    </button>
                </div>
            </div>

            <!-- 加载状态 -->
            <div v-if="loading" class="bg-white rounded-2xl shadow-lg border border-gray-100 p-12 text-center mb-6">
                <div class="text-lg text-primary-600">正在智能匹配院校...</div>
            </div>

            <!-- 查询结果 -->
            <template v-if="!loading && result">
                <!-- 结果概览 -->
                <div class="gradient-bg rounded-2xl p-6 mb-6 text-white">
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 text-center">
                        <div>
                            <div class="text-3xl font-bold">{{ result.score }}</div>
                            <div class="text-sm opacity-90">我的分数</div>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">约{{ result.rank }}名</div>
                            <div class="text-sm opacity-90">全市排名</div>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">{{ result.special_line }}</div>
                            <div class="text-sm opacity-90">特控线</div>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">{{ result.undergraduate_line }}</div>
                            <div class="text-sm opacity-90">本科线</div>
                        </div>
                        <div>
                            <div class="text-3xl font-bold">{{ result.total }}</div>
                            <div class="text-sm opacity-90">可填报院校</div>
                        </div>
                    </div>
                </div>

                <!-- 分数区间筛选 -->
                <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 mb-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">按录取概率筛选</h2>
                    <div class="flex flex-wrap gap-3">
                        <button v-for="filter in filters" :key="filter.value"
                                @click="activeFilter = filter.value"
                                :class="[
                                    'px-5 py-2 rounded-full font-medium transition-all',
                                    activeFilter === filter.value
                                        ? 'gradient-bg text-white shadow-md'
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                ]">
                            {{ filter.label }} ({{ getFilterCount(filter.value) }})
                        </button>
                    </div>
                </div>

                <!-- 图表展示 -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
                        <h2 class="text-lg font-bold text-gray-800 mb-4">录取概率分布</h2>
                        <canvas id="probabilityChart"></canvas>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
                        <h2 class="text-lg font-bold text-gray-800 mb-4">分数线分布</h2>
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>

                <!-- 院校列表 -->
                <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        推荐院校列表
                        <span class="text-sm font-normal text-gray-500 ml-2">
                            共 {{ filteredUniversities.length }} 所
                        </span>
                    </h2>

                    <div v-if="filteredUniversities.length === 0" class="text-center py-12 text-gray-400">
                        暂无符合条件的院校
                    </div>

                    <div v-else class="space-y-4">
                        <div v-for="uni in filteredUniversities" :key="uni.id"
                             class="border border-gray-100 rounded-xl p-5 hover:border-primary-200 hover:shadow-md transition-all">
                            <div class="flex items-start gap-4">
                                <!-- 录取概率圆圈 -->
                                <div class="w-20 h-20 rounded-full flex flex-col items-center justify-center text-white font-bold flex-shrink-0"
                                     :class="getProbClass(uni.probability)">
                                    <div class="text-xl">{{ uni.probability }}%</div>
                                    <div class="text-xs opacity-90">录取率</div>
                                </div>

                                <!-- 院校信息 -->
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-lg font-semibold text-gray-800 mb-2">{{ uni.name }}</h3>
                                    <div class="flex flex-wrap gap-2 mb-3">
                                        <span class="px-3 py-1 rounded-full text-sm font-medium"
                                              :class="{
                                                  'bg-emerald-100 text-emerald-700': uni.recommend_level === '稳妥',
                                                  'bg-blue-100 text-blue-700': uni.recommend_level === '较稳',
                                                  'bg-yellow-100 text-yellow-700': uni.recommend_level === '有风险',
                                                  'bg-pink-100 text-pink-700': uni.recommend_level === '冲一冲'
                                              }">
                                            {{ uni.recommend_level }}
                                        </span>
                                        <span class="px-3 py-1 bg-primary-100 text-primary-700 rounded-full text-sm font-medium">
                                            {{ uni.level }}
                                        </span>
                                        <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">
                                            {{ uni.location }}
                                        </span>
                                        <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">
                                            {{ uni.type }}
                                        </span>
                                    </div>
                                    <div class="text-sm text-gray-500" v-if="uni.popular_majors?.length">
                                        热门专业：{{ uni.popular_majors.join('、') }}
                                    </div>
                                </div>

                                <!-- 分数信息 -->
                                <div class="text-right flex-shrink-0 hidden sm:block">
                                    <div class="mb-2">
                                        <div class="text-xs text-gray-400">最低分</div>
                                        <div class="text-xl font-bold text-gray-800">{{ uni.min_score }}</div>
                                    </div>
                                    <div class="mb-2">
                                        <div class="text-xs text-gray-400">平均分</div>
                                        <div class="text-xl font-bold text-gray-800">{{ uni.avg_score }}</div>
                                    </div>
                                    <div>
                                        <span class="text-sm font-medium"
                                              :class="uni.gap >= 0 ? 'text-green-600' : 'text-red-500'">
                                            {{ uni.gap >= 0 ? '+' : '' }}{{ uni.gap }}分
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- JSON 数据预览 -->
                <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-800">JSON 数据</h2>
                        <button @click="showJSON = !showJSON" class="text-sm text-primary-600 hover:text-primary-800">
                            {{ showJSON ? '收起' : '展开' }}
                        </button>
                    </div>
                    <div v-show="showJSON" class="bg-gray-50 rounded-lg p-4 overflow-auto max-h-96">
                        <pre class="text-sm text-gray-700 whitespace-pre-wrap">{{ JSON.stringify(result, null, 2) }}</pre>
                    </div>
                </div>
            </template>

            <!-- 空状态 -->
            <div v-if="!loading && !result" class="bg-white rounded-2xl shadow-lg border border-gray-100 p-12 text-center">
                <div class="text-6xl mb-4">📊</div>
                <div class="text-xl text-gray-600 mb-2">请输入分数开始查询</div>
                <div class="text-gray-400">系统将根据您的分数，智能推荐可填报的院校</div>
            </div>
        </main>
        {% endraw %}
    </div>

    <script>
        const { createApp, ref, computed, nextTick } = Vue;

        createApp({
            setup() {
                const score = ref('');
                const year = ref(2024);
                const years = [2025, 2024, 2023, 2022, 2021, 2020];
                const loading = ref(false);
                const result = ref(null);
                const showJSON = ref(false);
                const activeFilter = ref('all');
                const mobileMenuOpen = ref(false);

                const filters = [
                    { value: 'all', label: '全部' },
                    { value: 'chong', label: '冲刺', min: 0, max: 40 },
                    { value: 'wen', label: '稳妥', min: 40, max: 70 },
                    { value: 'bao', label: '保底', min: 70, max: 101 }
                ];

                let probabilityChart = null;
                let scoreChart = null;

                // 根据筛选条件过滤院校
                const filteredUniversities = computed(() => {
                    if (!result.value) return [];
                    const universities = result.value.universities || [];

                    if (activeFilter.value === 'all') return universities;

                    const filter = filters.find(f => f.value === activeFilter.value);
                    if (!filter) return universities;

                    return universities.filter(u =>
                        u.probability >= filter.min && u.probability < filter.max
                    );
                });

                // 获取筛选数量
                const getFilterCount = (filterValue) => {
                    if (!result.value) return 0;
                    const universities = result.value.universities || [];

                    if (filterValue === 'all') return universities.length;

                    const filter = filters.find(f => f.value === filterValue);
                    if (!filter) return 0;

                    return universities.filter(u =>
                        u.probability >= filter.min && u.probability < filter.max
                    ).length;
                };

                // 获取概率样式类
                const getProbClass = (prob) => {
                    if (prob >= 70) return 'prob-high';
                    if (prob >= 40) return 'prob-medium';
                    if (prob >= 20) return 'prob-low';
                    return 'prob-risk';
                };

                // 查询处理
                const handleSearch = async () => {
                    const scoreVal = parseInt(score.value);
                    if (!scoreVal || scoreVal < 0 || scoreVal > 660) {
                        alert('请输入有效的分数（0-660分）');
                        return;
                    }

                    loading.value = true;
                    result.value = null;

                    try {
                        const response = await fetch(`/api/score?score=${scoreVal}&year=${year.value}`);
                        const data = await response.json();

                        if (data.success) {
                            result.value = data.data;
                            // 延迟渲染图表
                            await nextTick();
                            setTimeout(renderCharts, 100);
                        } else {
                            alert(data.message || '查询失败');
                        }
                    } catch (error) {
                        alert('网络错误，请稍后重试');
                        console.error('查询错误:', error);
                    } finally {
                        loading.value = false;
                    }
                };

                // 渲染图表
                const renderCharts = () => {
                    if (!result.value) return;

                    const universities = result.value.universities || [];

                    // 销毁旧图表
                    if (probabilityChart) {
                        probabilityChart.destroy();
                        probabilityChart = null;
                    }
                    if (scoreChart) {
                        scoreChart.destroy();
                        scoreChart = null;
                    }

                    // 概率分布饼图
                    const probCtx = document.getElementById('probabilityChart');
                    if (probCtx) {
                        const ranges = {
                            '冲刺 (0-40%)': universities.filter(u => u.probability < 40).length,
                            '稳妥 (40-70%)': universities.filter(u => u.probability >= 40 && u.probability < 70).length,
                            '保底 (70%+)': universities.filter(u => u.probability >= 70).length
                        };

                        probabilityChart = new Chart(probCtx, {
                            type: 'doughnut',
                            data: {
                                labels: Object.keys(ranges),
                                datasets: [{
                                    data: Object.values(ranges),
                                    backgroundColor: [
                                        'rgba(245, 158, 11, 0.8)',
                                        'rgba(59, 130, 246, 0.8)',
                                        'rgba(16, 185, 129, 0.8)'
                                    ],
                                    borderWidth: 0
                                }]
                            },
                            options: {
                                responsive: true,
                                plugins: {
                                    legend: {
                                        position: 'bottom'
                                    }
                                }
                            }
                        });
                    }

                    // 分数线柱状图
                    const scoreCtx = document.getElementById('scoreChart');
                    if (scoreCtx) {
                        const topUnis = universities.slice(0, 10);
                        const myScore = result.value.score;

                        scoreChart = new Chart(scoreCtx, {
                            type: 'bar',
                            data: {
                                labels: topUnis.map(u => u.name.length > 8 ? u.name.slice(0, 8) + '...' : u.name),
                                datasets: [
                                    {
                                        label: '最低分',
                                        data: topUnis.map(u => u.min_score),
                                        backgroundColor: 'rgba(102, 126, 234, 0.7)'
                                    },
                                    {
                                        label: '平均分',
                                        data: topUnis.map(u => u.avg_score),
                                        backgroundColor: 'rgba(118, 75, 162, 0.7)'
                                    },
                                    {
                                        label: '我的分数',
                                        data: topUnis.map(() => myScore),
                                        type: 'line',
                                        borderColor: 'rgba(239, 68, 68, 1)',
                                        borderWidth: 2,
                                        pointRadius: 0,
                                        borderDash: [5, 5]
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                scales: {
                                    y: {
                                        beginAtZero: false,
                                        min: Math.min(myScore, ...topUnis.map(u => u.min_score)) - 20
                                    }
                                },
                                plugins: {
                                    legend: {
                                        position: 'bottom'
                                    }
                                }
                            }
                        });
                    }
                };

                // 导出 JSON
                const exportJSON = () => {
                    if (!result.value) return;

                    const dataStr = JSON.stringify(result.value, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `score_query_${result.value.score}_${result.value.year}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                };

                return {
                    score, year, years, loading, result, showJSON, activeFilter, mobileMenuOpen,
                    filters, filteredUniversities, getFilterCount, getProbClass,
                    handleSearch, exportJSON
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
